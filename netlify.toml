[build]
  publish = "public"
  functions = "netlify/functions"

# Bundle the clients/*.json files into every serverless function so
# chat.js and config.js can read them at runtime on Netlify's Lambda.
[functions]
  included_files = ["clients/**"]

# Allow the embed script and config endpoint to be loaded cross-origin
# (clients will embed from their own domains).
[[headers]]
  for = "/embed.js"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    Cache-Control = "public, max-age=300"
    Content-Type = "application/javascript; charset=utf-8"

[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"